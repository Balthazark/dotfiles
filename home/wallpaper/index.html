<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>navi</title>
  <style>
    @font-face {
      font-family: 'VT323';
      src: url('fonts/VT323.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Share Tech Mono';
      src: url('fonts/ShareTechMono.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'PPNeueBit';
      src: url('fonts/PPNeueBit-Bold.otf') format('opentype');
      font-weight: bold;
      font-style: normal;
    }

    @font-face {
      font-family: 'PPMondwest';
      src: url('fonts/PPMondwest-Regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e2e;
    }

    /* scanlines */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.22) 2px,
        rgba(0, 0, 0, 0.22) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* vignette */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 55%,
        rgba(0, 0, 0, 0.72) 100%
      );
      pointer-events: none;
      z-index: 11;
    }

    #ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    #ambient-fg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
    }

    .logo-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 191px;
      pointer-events: none;
      z-index: 5;
    }

    .nix-logo {
      width: 100%;
      height: 100%;
      animation: spin 25s linear infinite, glow-pulse 4s ease-in-out infinite;
      will-change: filter, transform;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes glow-pulse {
      0%, 100% {
        filter:
          drop-shadow(0 0 6px rgba(126, 186, 228, 0.9))
          drop-shadow(0 0 18px rgba(82, 119, 195, 0.7))
          drop-shadow(0 0 45px rgba(82, 119, 195, 0.35));
      }
      50% {
        filter:
          drop-shadow(0 0 10px rgba(137, 220, 235, 1))
          drop-shadow(0 0 30px rgba(126, 186, 228, 0.85))
          drop-shadow(0 0 75px rgba(82, 119, 195, 0.5));
      }
    }
    /* navi — header of the system status panel */
    #panel-navi-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'PPMondwest', monospace;
      font-size: 32px;
      line-height: 1;
      color: #cdd6f4;
      opacity: 0.72;
      letter-spacing: 0.03em;
      text-shadow: 0 0 20px rgba(137, 180, 250, 0.22);
      margin-bottom: 8px;
    }

    /* NixOS — bottom-right corner, large display font mirrors the stats panel on the left */
    #logo-nixos {
      position: fixed;
      bottom: 52px;
      right: 32px;
      text-align: right;
      pointer-events: none;
      z-index: 8;
      user-select: none;
    }

    #logo-nixos-name {
      display: block;
      font-family: 'PPMondwest', monospace;
      font-size: 62px;
      line-height: 1;
      color: #cdd6f4;
      opacity: 0.45;
      letter-spacing: 0.02em;
    }

    #logo-nixos-arch {
      display: block;
      font-family: 'PPNeueBit', monospace;
      font-size: 18px;
      color: #cdd6f4;
      opacity: 0.42;
      letter-spacing: 0.14em;
      margin-top: 6px;
    }

    /* sys panel */
    #panel-sys {
      position: fixed;
      bottom: 52px;
      left: 32px;
      border-left: 2px solid rgba(137, 180, 250, 0.22);
      padding: 14px 18px 14px 12px;
      background: rgba(30, 30, 46, 0.42);
      border-radius: 3px;
      overflow: hidden;
      pointer-events: none;
      z-index: 8;
      user-select: none;
    }

    .sys-row {
      display: flex;
      gap: 14px;
      font-family: 'PPNeueBit', monospace;
      font-size: 14px;
      line-height: 2.3;
    }

    .sys-label {
      color: #a6adc8;
      letter-spacing: 0.10em;
      width: 42px;
    }

    .sys-val {
      color: #cdd6f4;
      letter-spacing: 0.05em;
    }

    .sys-sep {
      height: 1px;
      background: #45475a;
      margin: 4px 0;
      opacity: 0.55;
    }

    #panel-navi-header::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #a6e3a1;
      box-shadow: 0 0 6px rgba(166, 227, 161, 0.8);
      animation: pulse-dot 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.9; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.65); }
    }

    #sys-frame::after {
      content: '_';
      animation: blink-cursor 1.1s step-end infinite;
      color: #89b4fa;
      margin-left: 2px;
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #panel-sys::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: -30px;
      height: 30px;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(137, 180, 250, 0.05),
        transparent
      );
      animation: scan-sweep 5s linear infinite;
      pointer-events: none;
    }

    @keyframes scan-sweep {
      0%   { top: -30px; }
      100% { top: 100%; }
    }
  </style>
</head>
<body>
  <canvas id="ambient"></canvas>
  <canvas id="ambient-fg"></canvas>

  <div class="logo-container">
    <svg class="nix-logo" viewBox="0 0 501.70361 435.14028" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg-light"
          x1="200.59668" y1="351.41116" x2="290.08701" y2="506.18814"
          gradientUnits="userSpaceOnUse"
          gradientTransform="translate(70.505061,-1761.3076)">
          <stop offset="0" stop-color="#699ad7"/>
          <stop offset="0.244" stop-color="#7eb1dd"/>
          <stop offset="1" stop-color="#7ebae4"/>
        </linearGradient>
        <linearGradient id="lg-dark"
          x1="-584.19934" y1="782.33563" x2="-496.29703" y2="937.71399"
          gradientUnits="userSpaceOnUse"
          gradientTransform="translate(864.55062,-2197.497)">
          <stop offset="0" stop-color="#415e9a"/>
          <stop offset="0.232" stop-color="#4a6baf"/>
          <stop offset="1" stop-color="#5277c3"/>
        </linearGradient>
      </defs>
      <g transform="translate(-156.33871,933.1905)">
        <path id="lam-a" fill="url(#lg-light)"
          d="m 309.54892,-710.38827 122.19683,211.67512 -56.15706,0.5268 -32.6236,-56.8692 -32.85645,56.5653 -27.90237,-0.011 -14.29086,-24.6896 46.81047,-80.4901 -33.22946,-57.8257 z"/>
        <use href="#lam-a" transform="rotate(60,407.11155,-715.78724)"/>
        <use href="#lam-a" transform="rotate(-60,407.31177,-715.70016)"/>
        <use href="#lam-a" transform="rotate(180,407.41868,-715.7565)"/>
        <path id="lam-b" fill="url(#lg-dark)"
          d="m 309.54892,-710.38827 122.19683,211.67512 -56.15706,0.5268 -32.6236,-56.8692 -32.85645,56.5653 -27.90237,-0.011 -14.29086,-24.6896 46.81047,-80.4901 -33.22946,-57.8256 z"/>
        <use href="#lam-b" transform="rotate(120,407.33916,-716.08356)"/>
        <use href="#lam-b" transform="rotate(-120,407.28823,-715.86995)"/>
      </g>
    </svg>
  </div>

  <div id="logo-nixos">
    <span id="logo-nixos-name">nix-darwin</span>
    <span id="logo-nixos-arch">aarch64-darwin</span>
  </div>

  <div id="panel-sys">
    <div id="panel-navi-header">navi</div>
    <div class="sys-sep"></div>
    <div class="sys-row"><span class="sys-label">CORE</span><span class="sys-val" id="sys-cores">—</span></div>
    <div class="sys-row"><span class="sys-label">UP</span><span class="sys-val" id="sys-up">—</span></div>
    <div class="sys-row"><span class="sys-label">FPS</span><span class="sys-val" id="sys-fps">—</span></div>
    <div class="sys-row"><span class="sys-label">FRME</span><span class="sys-val" id="sys-frame">—</span></div>
  </div>

  <script>
    const canvas   = document.getElementById('ambient');
    const ctx      = canvas.getContext('2d', { desynchronized: true });
    const fgCanvas = document.getElementById('ambient-fg');
    const fgCtx    = fgCanvas.getContext('2d', { desynchronized: true });

    const WORLD = { w: 0, h: 0, cx: 0, cy: 0 };

    const resize = () => {
      canvas.width  = fgCanvas.width  = window.innerWidth;
      canvas.height = fgCanvas.height = window.innerHeight;
      WORLD.w  = canvas.width;
      WORLD.h  = canvas.height;
      WORLD.cx = WORLD.w / 2;
      WORLD.cy = WORLD.h / 2;
    };
    window.addEventListener('resize', resize);
    resize();

    // --- shared utilities ---
    const rand         = (a, b) => a + Math.random() * (b - a);
    const pick         = arr => arr[Math.floor(Math.random() * arr.length)];
    const pickWeighted = thresholds => {
      const r = Math.random();
      const i = thresholds.findIndex(t => r < t);
      return i === -1 ? thresholds.length : i;
    };

    // --- particles ---
    const NOISE    = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
    const JAPANESE = ['電脳','接続','記憶','存在','意識','現実','孤独','境界','信号','層','ネット','データ','エラー','システム','プロセス','メモリ','ホスト','カーネル'];
    const NIX      = ['flake.nix','wallpaper.nix','home-manager','nix-darwin','darwin/system.nix','mkDerivation','nixpkgs','home/zsh.nix','stdenv','buildInputs','home/git.nix','{ pkgs','...}:','inherit','lib.mkOption'];
    const LAIN     = ['LAYER:01','LAYER:02','LAYER:03','WIRED','THE WIRED','PROTOCOL 7','PRESENT DAY','PRESENT TIME','CLOSE THE WORLD','OPEN THE NEXT','TACHIBANA LABS','ACCELA','NAVI','DEUS','PSYCHE','RESET','DAEMON','REBOOT','BROADCAST','STATIC','OMNIPRESENT'];

    const LAYERS = [
      { speedMult: 0.38, opacMult: 0.32, sizeMult: 0.62 },  // background
      { speedMult: 1.0,  opacMult: 0.85, sizeMult: 1.0  },  // mid
      { speedMult: 1.75, opacMult: 1.42, sizeMult: 1.28 },  // foreground
    ];
    const POOL          = 70;
    const MAX_OPACITY   = 0.28;
    const WAVE_FREQ     = 0.02;
    const WAVE_AMP      = 0.1;
    const FLICKER_PROB  = 0.004;
    const FLICKER_START = 0.65;
    const FLICKER_DEPTH = 0.55;
    const WRAP_X        = 60;
    const WRAP_Y        = 30;

    function contentConfig(roll) {
      if (roll < 0.25) return {
        text: NOISE[Math.floor(Math.random() * NOISE.length)],
        fontFamily: "'Hiragino Sans', 'Yu Gothic', sans-serif",
        size: Math.floor(rand(12, 20)),
        color: '#cdd6f4',
        maxOpacity: rand(0.06, 0.10),
      };
      if (roll < 0.55) return {
        text: pick(JAPANESE),
        fontFamily: "'Hiragino Sans', 'Yu Gothic', sans-serif",
        size: Math.floor(rand(12, 18)),
        color: '#cdd6f4',
        maxOpacity: rand(0.07, 0.12),
      };
      if (roll < 0.80) return {
        text: pick(NIX),
        fontFamily: "'VT323', monospace",
        size: Math.floor(rand(13, 19)),
        color: '#89b4fa',
        maxOpacity: rand(0.07, 0.11),
      };
      return {
        text: pick(LAIN),
        fontFamily: "'Share Tech Mono', monospace",
        size: Math.floor(rand(11, 15)),
        color: '#74c7ec',
        maxOpacity: rand(0.10, 0.16),
      };
    }

    function createParticle() {
      const { speedMult, opacMult, sizeMult } = LAYERS[pickWeighted([0.4, 0.8])];
      const content = contentConfig(Math.random());
      const spawnX = rand(20, WORLD.w - 20);
      const spawnY = rand(20, WORLD.h - 20);

      const size       = Math.round(content.size * sizeMult);
      const maxOpacity = Math.min(content.maxOpacity * opacMult, MAX_OPACITY);
      const fadeIn     = Math.floor(rand(60, 120));
      const hold       = Math.floor(rand(200, 500));
      const fadeOut    = Math.floor(rand(60, 120));

      return {
        text:          content.text,
        font:          `${size}px ${content.fontFamily}`,
        color:         content.color,
        x:             spawnX,
        y:             spawnY,
        vx:            rand(-0.08, 0.08) * speedMult,
        vy:            rand(-0.08, 0.08) * speedMult,
        phase:         rand(0, Math.PI * 2),
        maxOpacity,
        fadeIn, hold, fadeOut,
        total:         fadeIn + hold + fadeOut,
        age:           0,
        typeSpeed:     rand(1.0, 2.0),
        flickerFrames: 0,
        flickerTotal:  0,
      };
    }

    function baseOpacity(p) {
      if (p.age < p.fadeIn)          return (p.age / p.fadeIn) * p.maxOpacity;
      if (p.age < p.fadeIn + p.hold) return p.maxOpacity;
      return ((p.total - p.age) / p.fadeOut) * p.maxOpacity;
    }

    function applyFlicker(p, opacity, dt) {
      if (p.flickerFrames > 0) {
        const t = 1 - (p.flickerFrames / p.flickerTotal);
        p.flickerFrames -= dt;
        return opacity * (1 - FLICKER_DEPTH * Math.sin(t * Math.PI));
      }
      if (p.age > p.fadeIn + p.hold * FLICKER_START && Math.random() < FLICKER_PROB * dt) {
        p.flickerTotal  = Math.floor(rand(20, 45));
        p.flickerFrames = p.flickerTotal;
      }
      return opacity;
    }

    const particles = Array.from({ length: POOL }, createParticle);
    particles.forEach(p => { p.age = Math.floor(rand(0, p.fadeIn + p.hold)); });

    function updateParticles(dt) {
      particles.forEach((p, i) => {
        if (p.age >= p.total) {
          particles[i] = createParticle();
          return;
        }
        p.currentOpacity = applyFlicker(p, baseOpacity(p), dt);
        p.x += (p.vx + Math.sin(p.age * WAVE_FREQ + p.phase) * WAVE_AMP) * dt;
        p.y += (p.vy + Math.cos(p.age * WAVE_FREQ + p.phase) * WAVE_AMP) * dt;
        if (p.x < -WRAP_X)          p.x = WORLD.w + WRAP_X;
        if (p.x > WORLD.w + WRAP_X) p.x = -WRAP_X;
        if (p.y < -WRAP_Y)          p.y = WORLD.h + WRAP_Y;
        if (p.y > WORLD.h + WRAP_Y) p.y = -WRAP_Y;
        p.age += dt;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        if (p.age >= p.total) return;
        const typingProgress = Math.min(p.age / (p.fadeIn * p.typeSpeed), 1);
        const displayLength  = Math.ceil(typingProgress * p.text.length);
        ctx.globalAlpha = p.currentOpacity;
        ctx.fillStyle   = p.color;
        ctx.font        = p.font;
        ctx.fillText(p.text.substring(0, displayLength), p.x, p.y);
        if (displayLength < p.text.length) ctx.fillText('_', p.x + ctx.measureText(p.text.substring(0, displayLength)).width, p.y);
      });
    }

    // --- boids ---
    const BOID_COUNT    = 130;
    const BOID_MAX_SPD  = 0.76;
    const BOID_MIN_SPD  = 0.18;
    const BOID_LAYERS   = [
      { scaleMult: 0.65, opacity: 0.16 },  // background — genuinely distant
      { scaleMult: 1.0,  opacity: 0.40 },  // mid
      { scaleMult: 1.25, opacity: 0.72 },  // foreground — occlusive
    ];
    const CONTAIN_R     = 300;   // soft boundary radius — no spring inside, gentle pull outside
    const CONTAIN_W     = 0.002;
    const SEP_DIST      = 30;
    const SEP_DIST2     = SEP_DIST * SEP_DIST;
    const SEP_WEIGHT    = 0.07;
    const ALIGN_DIST2   = 85 * 85;
    const ALIGN_WEIGHT  = 0.03;
    const COH_DIST2     = 120 * 120;
    const COH_WEIGHT    = 0.001;
    const WANDER_WEIGHT = 0.06;
    const WANDER_DRIFT  = 0.14;

    // pre-render λ once — drawImage is a GPU blit, fillText is software per call
    const sprite = { bitmap: null };
    const _lc = document.createElement('canvas');
    _lc.width = 36; _lc.height = 36;
    const _lctx = _lc.getContext('2d');
    document.fonts.ready.then(async () => {
      _lctx.textAlign    = 'center';
      _lctx.textBaseline = 'middle';
      _lctx.shadowBlur   = 8;
      _lctx.shadowColor  = '#89dceb';
      _lctx.fillStyle    = '#89dceb';
      _lctx.font         = "18px 'VT323', monospace";
      _lctx.fillText('λ', 18, 18);
      _lctx.fillText('λ', 18, 18);
      sprite.bitmap = await createImageBitmap(_lc);
    });

    function createBoid() {
      const angle    = rand(0, Math.PI * 2);
      const r        = rand(60, CONTAIN_R);
      const cx       = WORLD.cx;
      const cy       = WORLD.cy;
      const velAngle = rand(0, Math.PI * 2);
      const spd      = rand(BOID_MIN_SPD, BOID_MAX_SPD);
      const layerIdx = pickWeighted([0.35, 0.75]);
      const bl       = BOID_LAYERS[layerIdx];
      return {
        x:           cx + Math.cos(angle) * r,
        y:           cy + Math.sin(angle) * r,
        vx:          Math.cos(velAngle) * spd,
        vy:          Math.sin(velAngle) * spd,
        wanderAngle: rand(0, Math.PI * 2),
        layer:       layerIdx,
        scale:       bl.scaleMult,
        opacity:     bl.opacity,
      };
    }

    function clampSpeed(b) {
      const spd = Math.hypot(b.vx, b.vy);
      if (spd > BOID_MAX_SPD)            { b.vx = b.vx / spd * BOID_MAX_SPD; b.vy = b.vy / spd * BOID_MAX_SPD; }
      if (spd > 0 && spd < BOID_MIN_SPD) { b.vx = b.vx / spd * BOID_MIN_SPD; b.vy = b.vy / spd * BOID_MIN_SPD; }
    }

    const boids = Array.from({ length: BOID_COUNT }, createBoid);

    function accumulateNeighbors(b, i) {
      return boids.reduce((acc, o, j) => {
        if (i === j) return acc;
        const dx = o.x - b.x, dy = o.y - b.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < SEP_DIST2 && d2 > 0) {
          const d = Math.sqrt(d2);
          const s = (SEP_DIST - d) / SEP_DIST;
          acc.sepX -= dx / d * s; acc.sepY -= dy / d * s; acc.sepN++;
        }
        if (d2 < ALIGN_DIST2) { acc.alignVX += o.vx; acc.alignVY += o.vy; acc.alignN++; }
        if (d2 < COH_DIST2)   { acc.cohX += o.x;     acc.cohY += o.y;     acc.cohN++; }
        return acc;
      }, { sepX: 0, sepY: 0, sepN: 0, alignVX: 0, alignVY: 0, alignN: 0, cohX: 0, cohY: 0, cohN: 0 });
    }

    const applyNorm = (b, dx, dy, weight, dt) => {
      const m = Math.hypot(dx, dy);
      if (m === 0) return;
      b.vx += dx / m * weight * dt;
      b.vy += dy / m * weight * dt;
    };

    function updateBoids(dt) {
      const cx = WORLD.cx;
      const cy = WORLD.cy;

      boids.forEach((b, i) => {
        const { sepX, sepY, sepN, alignVX, alignVY, alignN, cohX, cohY, cohN } = accumulateNeighbors(b, i);

        if (sepN > 0)   applyNorm(b, sepX, sepY, SEP_WEIGHT, dt);
        if (alignN > 0) applyNorm(b, alignVX, alignVY, ALIGN_WEIGHT, dt);
        if (cohN > 0)   applyNorm(b, cohX / cohN - b.x, cohY / cohN - b.y, COH_WEIGHT, dt);

        // soft containment — free to roam inside CONTAIN_R, gently pulled back outside
        const rdx = b.x - cx, rdy = b.y - cy;
        const rdist = Math.hypot(rdx, rdy);
        if (rdist > CONTAIN_R) {
          b.vx -= rdx / rdist * (rdist - CONTAIN_R) * CONTAIN_W * dt;
          b.vy -= rdy / rdist * (rdist - CONTAIN_R) * CONTAIN_W * dt;
        }

        b.wanderAngle += rand(-WANDER_DRIFT, WANDER_DRIFT) * dt;
        b.vx += Math.cos(b.wanderAngle) * WANDER_WEIGHT * dt;
        b.vy += Math.sin(b.wanderAngle) * WANDER_WEIGHT * dt;

        clampSpeed(b);
        b.x += b.vx * dt;
        b.y += b.vy * dt;
      });
    }

    function drawBoids() {
      if (!sprite.bitmap) return;
      boids.forEach(b => {
        const target = b.layer === 2 ? fgCtx : ctx;
        target.globalAlpha = b.opacity;
        const angle = Math.atan2(b.vy, b.vx) + Math.PI / 2;
        const cs = Math.cos(angle) * b.scale, sn = Math.sin(angle) * b.scale;
        target.setTransform(cs, sn, -sn, cs, b.x, b.y);
        target.drawImage(sprite.bitmap, -18, -18);
      });
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      fgCtx.setTransform(1, 0, 0, 1, 0, 0);
    }

    // --- panels ---
    const PANELS_BOOT = performance.now();
    const perf = { fps: 0, frameMs: 0, _samples: [] };

    function fmtUptime(ms) {
      const s  = Math.floor(ms / 1000);
      const h  = Math.floor(s / 3600).toString().padStart(2, '0');
      const m  = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
      const sc = (s % 60).toString().padStart(2, '0');
      return `${h}:${m}:${sc}`;
    }

    function updatePanels() {
      document.getElementById('sys-cores').textContent = navigator.hardwareConcurrency || '—';
      document.getElementById('sys-up').textContent    = fmtUptime(performance.now() - PANELS_BOOT);
      const fpsEl = document.getElementById('sys-fps');
      const fps   = perf.fps;
      fpsEl.textContent = fps || '—';
      fpsEl.style.color = fps >= 90 ? '#94e2d5' : fps >= 50 ? '#cdd6f4' : fps > 0 ? '#f9e2af' : '#cdd6f4';
      document.getElementById('sys-frame').textContent = perf.fps ? perf.frameMs + 'ms' : '—';
    }

    setInterval(updatePanels, 1000);
    updatePanels();

    // --- loop ---
    const loop = { rafId: null, lastFrameTime: 0 };

    function frame(ts) {
      loop.rafId = requestAnimationFrame(frame);
      const rawMs = ts - loop.lastFrameTime;
      const dt    = Math.min(rawMs / (1000 / 60), 3);
      if (loop.lastFrameTime > 0) {
        perf._samples.push(rawMs);
        if (perf._samples.length > 60) perf._samples.shift();
        const avg    = perf._samples.reduce((a, b) => a + b) / perf._samples.length;
        perf.fps     = Math.round(1000 / avg);
        perf.frameMs = avg.toFixed(1);
      }
      loop.lastFrameTime = ts;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      fgCtx.clearRect(0, 0, fgCanvas.width, fgCanvas.height);
      updateBoids(dt);
      drawBoids();
      updateParticles(dt);
      drawParticles();
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        cancelAnimationFrame(loop.rafId);
        loop.rafId = null;
        return;
      }
      if (!loop.rafId) requestAnimationFrame(frame);
    });

    requestAnimationFrame(frame);
  </script>
</body>
</html>
