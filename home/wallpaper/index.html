<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>navi</title>
  <style>
    @font-face {
      font-family: 'VT323';
      src: url('fonts/VT323.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Share Tech Mono';
      src: url('fonts/ShareTechMono.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e2e;
    }

    /* scanlines */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.22) 2px,
        rgba(0, 0, 0, 0.22) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* vignette */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 55%,
        rgba(0, 0, 0, 0.72) 100%
      );
      pointer-events: none;
      z-index: 11;
    }

    #ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .logo-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 191px;
      pointer-events: none;
      z-index: 5;
    }

    .nix-logo {
      width: 100%;
      height: 100%;
      animation: spin 25s linear infinite, glow-pulse 4s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes glow-pulse {
      0%, 100% {
        filter:
          drop-shadow(0 0 6px rgba(126, 186, 228, 0.9))
          drop-shadow(0 0 18px rgba(82, 119, 195, 0.7))
          drop-shadow(0 0 45px rgba(82, 119, 195, 0.35));
      }
      50% {
        filter:
          drop-shadow(0 0 10px rgba(137, 220, 235, 1))
          drop-shadow(0 0 30px rgba(126, 186, 228, 0.85))
          drop-shadow(0 0 75px rgba(82, 119, 195, 0.5));
      }
    }
  </style>
</head>
<body>
  <canvas id="ambient"></canvas>

  <div class="logo-container">
    <svg class="nix-logo" viewBox="0 0 501.70361 435.14028" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg-light"
          x1="200.59668" y1="351.41116" x2="290.08701" y2="506.18814"
          gradientUnits="userSpaceOnUse"
          gradientTransform="translate(70.505061,-1761.3076)">
          <stop offset="0" stop-color="#699ad7"/>
          <stop offset="0.244" stop-color="#7eb1dd"/>
          <stop offset="1" stop-color="#7ebae4"/>
        </linearGradient>
        <linearGradient id="lg-dark"
          x1="-584.19934" y1="782.33563" x2="-496.29703" y2="937.71399"
          gradientUnits="userSpaceOnUse"
          gradientTransform="translate(864.55062,-2197.497)">
          <stop offset="0" stop-color="#415e9a"/>
          <stop offset="0.232" stop-color="#4a6baf"/>
          <stop offset="1" stop-color="#5277c3"/>
        </linearGradient>
      </defs>
      <g transform="translate(-156.33871,933.1905)">
        <path id="lam-a" fill="url(#lg-light)"
          d="m 309.54892,-710.38827 122.19683,211.67512 -56.15706,0.5268 -32.6236,-56.8692 -32.85645,56.5653 -27.90237,-0.011 -14.29086,-24.6896 46.81047,-80.4901 -33.22946,-57.8257 z"/>
        <use href="#lam-a" transform="rotate(60,407.11155,-715.78724)"/>
        <use href="#lam-a" transform="rotate(-60,407.31177,-715.70016)"/>
        <use href="#lam-a" transform="rotate(180,407.41868,-715.7565)"/>
        <path id="lam-b" fill="url(#lg-dark)"
          d="m 309.54892,-710.38827 122.19683,211.67512 -56.15706,0.5268 -32.6236,-56.8692 -32.85645,56.5653 -27.90237,-0.011 -14.29086,-24.6896 46.81047,-80.4901 -33.22946,-57.8256 z"/>
        <use href="#lam-b" transform="rotate(120,407.33916,-716.08356)"/>
        <use href="#lam-b" transform="rotate(-120,407.28823,-715.86995)"/>
      </g>
    </svg>
  </div>

  <script>
    const canvas = document.getElementById('ambient');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const NOISE     = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
    const JAPANESE  = ['電脳','接続','記憶','存在','意識','現実','孤独','境界','信号','層','ネット','データ','エラー','システム','プロセス','メモリ','ホスト','カーネル'];
    const NIX       = ['flake.nix','wallpaper.nix','home-manager','nix-darwin','darwin/system.nix','mkDerivation','nixpkgs','home/zsh.nix','stdenv','buildInputs','home/git.nix','{ pkgs','...}:','inherit','lib.mkOption'];
    const LAIN      = ['LAYER:01','LAYER:02','LAYER:03','WIRED','PROTOCOL 7','PRESENT DAY','PRESENT TIME','CLOSE THE WORLD','TACHIBANA LABS','ACCELA','NAVI'];

    function rand(a, b) { return a + Math.random() * (b - a); }
    function pick(arr)  { return arr[Math.floor(Math.random() * arr.length)]; }

    function createParticle() {
      const lr         = Math.random();
      const layer      = lr < 0.4 ? 0 : lr < 0.8 ? 1 : 2;
      const speedMult  = [0.4, 1.0, 1.7][layer];
      const opacMult   = [0.6, 1.0, 1.3][layer];
      const sizeMult   = [0.8, 1.0, 1.2][layer];

      const roll = Math.random();
      let text, fontFamily, size, color, maxOpacity;

      if (roll < 0.25) {
        // noise
        text       = NOISE[Math.floor(Math.random() * NOISE.length)];
        fontFamily = "'Hiragino Sans', 'Yu Gothic', sans-serif";
        size       = Math.floor(rand(12, 20));
        color      = '#cdd6f4';
        maxOpacity = rand(0.06, 0.10);
      } else if (roll < 0.55) {
        // ambient — japanese words
        text       = pick(JAPANESE);
        fontFamily = "'Hiragino Sans', 'Yu Gothic', sans-serif";
        size       = Math.floor(rand(12, 18));
        color      = '#cdd6f4';
        maxOpacity = rand(0.07, 0.12);
      } else if (roll < 0.80) {
        // data — nix fragments
        text       = pick(NIX);
        fontFamily = "'VT323', monospace";
        size       = Math.floor(rand(13, 19));
        color      = '#89b4fa';
        maxOpacity = rand(0.07, 0.11);
      } else {
        // signal — lain strings
        text       = pick(LAIN);
        fontFamily = "'Share Tech Mono', monospace";
        size       = Math.floor(rand(11, 15));
        color      = '#74c7ec';
        maxOpacity = rand(0.10, 0.16);
      }

      size       = Math.round(size * sizeMult);
      maxOpacity = Math.min(maxOpacity * opacMult, 0.22);

      const fadeIn  = Math.floor(rand(60, 120));
      const hold    = Math.floor(rand(200, 500));
      const fadeOut = Math.floor(rand(60, 120));

      return {
        text,
        font: `${size}px ${fontFamily}`,
        color,
        x: rand(20, canvas.width  - 20),
        y: rand(20, canvas.height - 20),
        vx: rand(-0.12, 0.12) * speedMult,
        vy: rand(-0.12, 0.12) * speedMult,
        phase: rand(0, Math.PI * 2),
        maxOpacity,
        opacity: 0,
        fadeIn, hold, fadeOut,
        age: 0,
        flickerFrames: 0,
        flickerTotal: 0,
      };
    }

    const POOL = 50;
    const particles = Array.from({ length: POOL }, createParticle);
    particles.forEach(p => { p.age = Math.floor(rand(0, p.fadeIn + p.hold)); });

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const total = p.fadeIn + p.hold + p.fadeOut;

        if (p.age >= total) {
          particles[i] = createParticle();
          continue;
        }

        if (p.age < p.fadeIn) {
          p.opacity = (p.age / p.fadeIn) * p.maxOpacity;
        } else if (p.age < p.fadeIn + p.hold) {
          p.opacity = p.maxOpacity;
        } else {
          p.opacity = ((total - p.age) / p.fadeOut) * p.maxOpacity;
        }

        if (p.flickerFrames > 0) {
          const t = 1 - (p.flickerFrames / p.flickerTotal);
          p.opacity *= 1 - (0.55 * Math.sin(t * Math.PI));
          p.flickerFrames--;
        } else if (p.age > p.fadeIn + p.hold * 0.65 && Math.random() < 0.004) {
          p.flickerTotal  = Math.floor(rand(20, 45));
          p.flickerFrames = p.flickerTotal;
        }

        p.x += p.vx + Math.sin(p.age * 0.02 + p.phase) * 0.1;
        p.y += p.vy + Math.cos(p.age * 0.02 + p.phase) * 0.1;
        if (p.x < -60)              p.x = canvas.width  + 60;
        if (p.x > canvas.width  + 60) p.x = -60;
        if (p.y < -30)              p.y = canvas.height + 30;
        if (p.y > canvas.height + 30) p.y = -30;

        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle   = p.color;
        ctx.font        = p.font;
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();

        p.age++;
      }

      requestAnimationFrame(tick);
    }

    tick();
  </script>
</body>
</html>
