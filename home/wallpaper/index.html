<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>navi</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e2e; /* catppuccin mocha base */
    }

    /* scanlines */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.18) 2px,
        rgba(0, 0, 0, 0.18) 3px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* vignette */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 55%,
        rgba(0, 0, 0, 0.72) 100%
      );
      pointer-events: none;
      z-index: 11;
    }

    .menubar-glow {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 30vh;
      background: linear-gradient(
        to bottom,
        rgba(126, 186, 228, 0.14) 0%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="menubar-glow"></div>
</body>
</html>
